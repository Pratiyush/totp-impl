name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: "What problem does this solve?"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: "How should this work?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "What other approaches did you consider?"
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Core TOTP/HOTP
        - QR Code generation
        - Replay protection
        - Configuration
        - Documentation
        - Other
