name: Maven Publish

on:
  pull_request:
    branches: [ main, master ]
    types: [ closed ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run when PR is actually merged (not just closed)
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install GPG + pinentry
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends gnupg2 gnupg-agent pinentry-curses

      - name: Configure GPG agent for loopback
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          if [ -x "/usr/bin/pinentry-curses" ]; then
            echo "pinentry-program /usr/bin/pinentry-curses" >> ~/.gnupg/gpg-agent.conf
          elif [ -x "/usr/bin/pinentry" ]; then
            echo "pinentry-program /usr/bin/pinentry" >> ~/.gnupg/gpg-agent.conf
          fi
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          chmod 600 ~/.gnupg/gpg-agent.conf ~/.gnupg/gpg.conf
          gpgconf --homedir "$HOME/.gnupg" --kill gpg-agent || true
          sleep 1
          gpgconf --homedir "$HOME/.gnupg" --launch gpg-agent || true

      - name: Import GPG private key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      - name: Calculate next version
        id: version
        run: |
          CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Current pom version: $CURRENT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="$MAJOR.$MINOR.$NEXT_PATCH"
          echo "Release version: $NEXT_VERSION"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set release version in pom.xml
        run: |
          mvn -B versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Build, sign, and deploy to Maven Central
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_TOKEN: ${{ secrets.SONATYPE_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          mvn -B -e -DskipTests clean deploy \
            -s .github/maven/settings.xml \
            -P release

      - name: Configure git
        run: |
          git config user.name "Pratiyush"
          git config user.email "pratiyush1@gmail.com"

      - name: Create release branch, tag, and push version bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Commit the version bump
          git add pom.xml
          git commit -m "chore(release): bump to $VERSION"

          # Create release branch
          git branch "release/$VERSION"
          git push origin "release/$VERSION"

          # Create tag
          git tag "v$VERSION"
          git push origin "v$VERSION"

          # Push version bump to master
          git push origin HEAD

      - name: Create GitHub Release
        uses: ncipollo/release-action@v2
        with:
          tag: "v${{ steps.version.outputs.version }}"
          name: "Release v${{ steps.version.outputs.version }}"
          body: |
            ## Release v${{ steps.version.outputs.version }}

            Published to Maven Central:
            ```xml
            <dependency>
                <groupId>io.github.pratiyush</groupId>
                <artifactId>totp-lib</artifactId>
                <version>${{ steps.version.outputs.version }}</version>
            </dependency>
            ```
          draft: false
          prerelease: false
